# HTTP-only bootstrap vhost for first Let's Encrypt issuance on roots-agency.payam-dehkordy.com.
# First-time setup: Droplet/bin/site-up.sh — see Droplet/docs/SHARED_DROPLET_GO_LIVE.md.

server {
    listen 80;
    listen [::]:80;
    server_name roots-agency.payam-dehkordy.com;

    root /var/www/roots-agency/current/public;
    index index.php;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
    }

    location / {
        try_files $uri /router.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
