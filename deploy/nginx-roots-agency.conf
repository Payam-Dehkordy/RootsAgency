# Canonical vhost for https://roots-agency.payam-dehkordy.com/
# GitHub Actions copies this file to /etc/nginx/sites-available/roots-agency.conf on each deploy.
#
# Stack: Cloudflare -> DigitalOcean Droplet -> Nginx + PHP-FPM
# Web root on server: /var/www/roots-agency/current/public
# TLS paths:
#   /etc/letsencrypt/live/roots-agency.payam-dehkordy.com/

server {
    listen 80;
    listen [::]:80;
    server_name roots-agency.payam-dehkordy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name roots-agency.payam-dehkordy.com;

    ssl_certificate     /etc/letsencrypt/live/roots-agency.payam-dehkordy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roots-agency.payam-dehkordy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/roots-agency/current/public;
    index index.php;

    add_header Content-Security-Policy "frame-ancestors 'self' https://www.payam-dehkordy.com https://payam-dehkordy.com http://127.0.0.1 http://localhost" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ ^/(config|storage)/ {
        deny all;
        return 404;
    }

    location = /sitemap.xml {
        try_files /sitemap.php =404;
    }

    location = /index.php {
        return 301 /;
    }

    location ^~ /media/video/ {
        gzip off;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
        access_log off;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri /router.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
